events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # AI Assistant (Iyobo)
        location /chat {
            proxy_pass http://ai_assistant:8080/chat;
        }
        location /telegram/ {
            proxy_pass http://ai_assistant:8080/telegram/;
        }

        # Language Academy (Edo Academy)
        location /api/academy/ {
            rewrite ^/api/academy/(.*) /$1 break;
            proxy_pass http://language_academy:8004;
        }

        # Store / Idia Coin Payments
        location /api/store/ {
            rewrite ^/api/store/(.*) /$1 break;
            proxy_pass http://store:8000;
        }

        # Hotels & Tourism
        location /api/hotels/ {
            rewrite ^/api/hotels/(.*) /$1 break;
            proxy_pass http://hotels:8000;
        }
    }
}