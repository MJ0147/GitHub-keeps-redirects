type User 
  @model 
  @auth(rules: [
    # 1. Allow the owner to manage their own record
    { allow: owner, ownerField: "id" },
    # 2. Allow Admins (Cognito Group) full access
    { allow: groups, groups: ["Admins"] },
    # 3. Allow signed-in users to read other profiles (if desired)
    { allow: private, operations: [read] }
  ]) {
  id: ID! @primaryKey
  fullName: String
  email: AWSEmail! @index(name: "byEmail", queryField: "userByEmail")
  isActive: Boolean @default(value: "true")
  isSuperuser: Boolean @default(value: "false")
  
  # Example relationship: A user could have many AI sessions
  # sessions: [AISession] @hasMany
}
